services:
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    hostname: spark-master
    ports:
      - "7077:7077"
      - "8080:8080"
    networks:
      - spark-net
    volumes:
      - ./metrics.properties:/opt/spark/conf/metrics.properties
      - ./netflix_titles.csv:/opt/spark/work-dir/netflix_titles.csv
      - ./job.py:/opt/spark/work-dir/job.py
    command: >
      /bin/bash -c "
      /opt/spark/sbin/start-master.sh
      --host spark-master
      --port 7077
      --webui-port 8080
      && tail -f /dev/null
      "

  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: spark-worker-1
    hostname: spark-worker-1
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    networks:
      - spark-net
    volumes:
      - ./metrics.properties:/opt/spark/conf/metrics.properties
      - ./netflix_titles.csv:/opt/spark/work-dir/netflix_titles.csv
    command: >
      /bin/bash -c "
      /opt/spark/sbin/start-worker.sh
      spark://spark-master:7077
      --webui-port 8081
      && tail -f /dev/null
      "

  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: spark-worker-2
    hostname: spark-worker-2
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    networks:
      - spark-net
    volumes:
      - ./metrics.properties:/opt/spark/conf/metrics.properties
      - ./netflix_titles.csv:/opt/spark/work-dir/netflix_titles.csv
    command: >
      /bin/bash -c "
      /opt/spark/sbin/start-worker.sh
      spark://spark-master:7077
      --webui-port 8081
      && tail -f /dev/null
      "

  spark-worker-3:
    image: apache/spark:3.5.0
    container_name: spark-worker-3
    hostname: spark-worker-3
    depends_on:
      - spark-master
    ports:
      - "8083:8081"
    networks:
      - spark-net
    volumes:
      - ./metrics.properties:/opt/spark/conf/metrics.properties
      - ./netflix_titles.csv:/opt/spark/work-dir/netflix_titles.csv
    command: >
      /bin/bash -c "
      /opt/spark/sbin/start-worker.sh
      spark://spark-master:7077
      --webui-port 8081
      && tail -f /dev/null
      "

networks:
  spark-net:
    name: spark-net
    driver: bridge